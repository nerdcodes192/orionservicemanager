<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somotex Service Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--navy:#1E3A5F;--blue:#1E4E8C;--blue-light:#2563EB;--blue-hover:#1d4ed8;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7;--red:#dc2626;--red-bg:#fee2e2;--blue-bg:#dbeafe;--sidebar-w:240px}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-50);color:var(--gray-800);font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100%;height:100dvh;z-index:200;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.topbar{height:64px;background:#fff;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.content{padding:24px;flex:1}
.s-logo{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:12px}
.s-logo img{height:34px;filter:brightness(1.1)}
.s-logo-t{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.s-logo-s{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.s-nav{flex:1;padding:10px 0;overflow-y:auto;min-height:0}
.s-sec{padding:8px 20px 4px;font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.s-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.s-item:hover{background:rgba(255,255,255,.08);color:#fff}
.s-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#60a5fa}
.s-item svg{width:17px;height:17px;flex-shrink:0}
.s-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);flex-shrink:0}
.u-info{display:flex;align-items:center;gap:10px}
.u-av{width:34px;height:34px;background:var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.u-nm{font-size:12px;font-weight:600;color:#fff}
.u-rl{font-size:11px;color:rgba(255,255,255,.5)}
.lout{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:4px;margin-left:auto}
.lout:hover{color:#fff}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px;color:var(--gray-500)}
.tb-right{display:flex;align-items:center;gap:10px}
.chip{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--blue-bg);color:var(--blue)}
.chip.grey{background:var(--gray-100);color:var(--gray-600)}
.auth-wrap{min-height:100vh;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo img{height:48px;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto}
.auth-logo h1{font-size:20px;font-weight:700;color:var(--navy)}
.auth-logo p{font-size:13px;color:var(--gray-500)}
.tabs{display:flex;margin-bottom:24px;border-bottom:2px solid var(--gray-200)}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.fg{margin-bottom:16px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:11px;font-weight:700;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:13px;color:var(--gray-800);background:#fff;outline:none;transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
textarea{resize:vertical;min-height:80px}
input:disabled,input[readonly]{background:var(--gray-100)}
.ac-wrap{position:relative}
.ac-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--gray-200);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none}
.ac-dd.open{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--gray-100)}
.ac-item:hover{background:var(--blue-bg);color:var(--blue)}
.ac-item small{display:block;font-size:11px;color:var(--gray-400)}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-hover)}
.btn-secondary{background:#fff;color:var(--gray-700);border:1.5px solid var(--gray-200)}
.btn-secondary:hover{background:var(--gray-50)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:0 14px;font-size:13px;height:36px;box-sizing:border-box}
.btn-full{width:100%;justify-content:center;padding:11px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.card{background:#fff;border-radius:10px;border:1px solid var(--gray-200);padding:20px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700}
.card-sub{font-size:12px;color:var(--gray-500);margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:#fff;border-radius:10px;border:1px solid var(--gray-200);padding:20px;display:flex;align-items:center;gap:16px}
.stat-ico{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-val{font-size:28px;font-weight:800;line-height:1}
.stat-lbl{font-size:12px;color:var(--gray-500);font-weight:500;margin-top:3px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:10px;border:1px solid var(--gray-200);padding:20px}
.chart-title{font-size:14px;font-weight:700;color:var(--gray-700);margin-bottom:14px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gray-200);background:var(--gray-50)}
td{padding:11px 14px;font-size:13px;color:var(--gray-700);border-bottom:1px solid var(--gray-100)}
tr:hover td{background:var(--gray-50)}
.tbl-actions{display:flex;gap:6px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.b-opened{background:var(--blue-bg);color:var(--blue)}
.b-pending{background:var(--amber-bg);color:var(--amber)}
.b-closed{background:var(--green-bg);color:var(--green)}
.b-approved{background:var(--green-bg);color:var(--green)}
.b-rejected{background:var(--red-bg);color:var(--red)}
.b-waiting{background:var(--amber-bg);color:var(--amber)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.modal-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;gap:10px;justify-content:flex-end}
.modal-close{background:none;border:none;cursor:pointer;color:var(--gray-400);padding:4px;line-height:1}
.modal-close:hover{color:var(--gray-700)}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:nowrap;width:100%;overflow:visible}
.srch{display:flex;align-items:center;background:#fff;border:1.5px solid var(--gray-200);border-radius:8px;padding:0 12px;gap:8px;flex:1 1 auto;min-width:160px;max-width:280px;height:36px;box-sizing:border-box}
.srch input{border:none;background:none;outline:none;font-size:13px;width:100%;line-height:36px;height:100%}
.fsel{height:36px;padding:0 8px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:13px;background:#fff;cursor:pointer;appearance:auto;-webkit-appearance:auto;color:var(--gray-700);min-width:0;max-width:160px;box-sizing:border-box}
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.pager-info{font-size:12px;color:var(--gray-500)}
.pager-btns{display:flex;gap:4px}
.pg-btn{padding:5px 10px;border:1px solid var(--gray-200);background:#fff;border-radius:6px;font-size:12px;cursor:pointer}
.pg-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pg-btn:hover:not(.active){background:var(--gray-100)}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.alert-error{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5}
.alert-success{background:var(--green-bg);color:var(--green);border:1px solid #86efac}
.alert-info{background:var(--blue-bg);color:var(--blue);border:1px solid #93c5fd}
.empty{text-align:center;padding:48px;color:var(--gray-400)}
.spin{width:20px;height:20px;border:2px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.ld{display:flex;align-items:center;justify-content:center;padding:48px;gap:12px;color:var(--gray-500)}
.sec-title{font-size:20px;font-weight:800;margin-bottom:4px}
.sec-sub{font-size:13px;color:var(--gray-500);margin-bottom:20px}
.divider{height:1px;background:var(--gray-200);margin:14px 0}
.hist-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.hist-dot{width:10px;height:10px;border-radius:50%;background:var(--blue-light);flex-shrink:0;margin-top:3px}
.hist-title{font-size:13px;font-weight:600;color:var(--gray-700)}
.hist-meta{font-size:11px;color:var(--gray-400);margin-top:2px}
.req::after{content:" *";color:var(--red)}
.bold{font-weight:700}
.muted{color:var(--gray-500)}
.sm{font-size:12px}
.mt1{margin-top:4px}
.mt2{margin-top:8px}
.mb0{margin-bottom:0}
.flex{display:flex}
.gap2{gap:8px}
.jend{justify-content:flex-end}

/* ── Hamburger button (mobile only) ── */
.ham-btn{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--gray-800);-webkit-tap-highlight-color:transparent}
.ham-btn svg{width:22px;height:22px;display:block}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150}
.overlay-bg.open{display:block;animation:fadein .2s ease}

/* ── Tablet (768–1024px): sidebar visible, 2-col stats ── */
@media(max-width:1024px){
  .stats{grid-template-columns:repeat(2,1fr)}
}

/* ── Mobile (≤768px) ── */
@media(max-width:768px){
  /* Sidebar slides in over content */
  .sidebar{transform:translateX(-100%)}
  .sidebar.mob-open{transform:translateX(0) !important;box-shadow:6px 0 30px rgba(0,0,0,.4)}
  .main{margin-left:0}
  .ham-btn{display:flex;align-items:center;justify-content:center}

  /* Topbar */
  .topbar{padding:0 12px;height:56px}
  .tb-title{font-size:14px}
  .tb-sub{display:none}
  .chip{font-size:11px;padding:3px 8px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Content */
  .content{padding:12px}

  /* Stats */
  .stats{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{padding:12px 10px;gap:10px}
  .stat-val{font-size:20px}
  .stat-ico{width:38px;height:38px;flex-shrink:0}
  .stat-lbl{font-size:11px}

  /* Charts */
  .charts{grid-template-columns:1fr}

  /* Cards */
  .card{padding:12px}
  .card-hdr{margin-bottom:10px}
  .card-title{font-size:14px}

  /* Form rows */
  .frow{grid-template-columns:1fr}
  .fg{margin-bottom:12px}

  /* Toolbar: search full-width on top, filters wrap in row below */
  .toolbar{flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .srch{order:-1;flex:0 0 100%;max-width:100%;min-width:0}
  .fsel{flex:1 1 calc(50% - 3px);max-width:none;font-size:12px;padding:6px 6px}
  .btn-sm{font-size:12px;padding:6px 10px;white-space:nowrap;flex-shrink:0}

  /* Tables */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:520px}
  th{padding:8px 8px;font-size:11px}
  td{padding:8px 8px;font-size:12px}

  /* Pagination */
  .pager{flex-direction:column;gap:8px;align-items:flex-start}

  /* Modal as bottom sheet */
  .overlay{align-items:flex-end;padding:0}
  .modal{max-width:100%;width:100%;margin:0;border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:88vh}
  .modal-hdr{padding:16px 16px 12px}
  .modal-body{padding:14px 16px}
  .modal-foot{padding:12px 16px}

  /* Auth */
  .auth-wrap{padding:12px;align-items:flex-start;padding-top:40px}
  .auth-card{padding:22px 16px}
  .auth-logo img{height:38px}
  .auth-logo h1{font-size:17px}

  /* Section */
  .sec-title{font-size:16px}
  .sec-sub{font-size:12px;margin-bottom:14px}

  /* Sidebar footer always visible */
  .s-foot{padding:12px 16px;flex-shrink:0}
  .u-nm{font-size:11px}
  .u-rl{font-size:10px}
  .u-av{width:30px;height:30px;font-size:11px}

  /* Autocomplete */
  .ac-dd{max-height:150px}
}

/* ── Small phones (≤400px) ── */
@media(max-width:400px){
  .stats{grid-template-columns:1fr 1fr}
  .stat-val{font-size:17px}
  .stat{padding:10px 8px;gap:8px}
  .fsel{flex:1 1 100%;max-width:100%}
  .chip.grey{display:none}
}  .stat-val{font-size:18px}
  .fsel{flex:1 1 100%}
  .chip.grey{display:none}
  .topbar{padding:0 10px}

</style>
</head>

<div id="root"></div>
<script>
// Product data is now fetched from the backend API — zero hardcoded products
let PM_CACHE = { products: [], brands: [], categories: [], subCategories: [], meta: null, loaded: false };
async function loadProductMaster() {
  if (PM_CACHE.loaded || S.api === "DEMO") return;
  try {
    const m = await call("GET", "/products/meta");
    PM_CACHE.brands = m.brands || [];
    PM_CACHE.categories = m.categories || [];
    PM_CACHE.subCategories = m.subCategories || [];
    PM_CACHE.meta = m;
    const r = await call("GET", "/products?limit=2000");
    PM_CACHE.products = r.products || [];
    PM_CACHE.loaded = true;
  } catch(e) { console.warn("Product Master load failed:", e.message); }
}
const CAT_NAMES = {"AC":"Air Conditioner","WD":"Water Dispenser","REF":"Refrigerator","BVC":"Beverage Cooler","CF":"Chest Freezer","GC":"Gas Cooker","CT":"Cooktop","FAN":"Fan","WM":"Washing Machine","GEN":"Generator","LED":"LED TV","SDA":"Small Domestic Appliance","BI":"Built-In","MWO":"Microwave Oven"};

// ── Branch cache (HO/Admin branch filters) ───────────────
let BRANCH_CACHE = { list: [], loaded: false };
async function loadBranches() {
  if (BRANCH_CACHE.loaded) return;
  if (S.api === "DEMO") { BRANCH_CACHE.list = BRANCHES.slice(); BRANCH_CACHE.loaded = true; return; }
  try {
    const r = await call("GET", "/services/meta/branches");
    BRANCH_CACHE.list = (r.branches && r.branches.length) ? r.branches : BRANCHES.slice();
    BRANCH_CACHE.loaded = true;
  } catch(e) {
    BRANCH_CACHE.list = BRANCHES.slice();
    BRANCH_CACHE.loaded = true;
    console.warn("Branch list load failed:", e.message);
  }
}

    method,

async function demoCall(method, path, body) {
  await new Promise(r => setTimeout(r, 150));
  const base = path.split("?")[0];
  const qs = new URLSearchParams(path.split("?")[1] || "");
  if (base === "/auth/login") {
    const emailMap = { "admin@somotex.com": _dUsrs()[0], "coord@somotex.com": _dUsrs()[1], "ho@somotex.com": _dUsrs()[2], "tech@somotex.com": _dUsrs()[3], "branch@somotex.com": _dUsrs()[4] };
    // Support login by email or mobile number
    let u = emailMap[body.email];
    if (!u && body.mobileNumber) {
      u = _dUsrs().find(x => x.mobileNumber === body.mobileNumber);
    }
    if (!u || body.password !== "password123") throw new Error("Invalid credentials. Use email or mobile + password123");
    if (u.status !== "Approved") throw new Error("Account not yet approved.");
    return { token: "demo", user: u };
  }
  if (base === "/auth/register") return { message: "Demo: registration submitted" };
  if (base === "/products" && method === "GET") return window.__customProds || [];
  if (base === "/products" && method === "POST") {
    const prod = { _id: "cp" + Date.now(), ...body, addedByName: S.user.fullName, createdAt: new Date() };
    window.__customProds = window.__customProds || [];
    window.__customProds.unshift(prod);
    return prod;
  }
  if (method === "DELETE" && base.startsWith("/products/")) {
    const id = base.split("/").pop();
    window.__customProds = (window.__customProds || []).filter(p => p._id !== id);
    return { message: "Deleted" };
  }
  if (base === "/services/meta/branches") return { branches: BRANCHES.slice() };
  if (base === "/services/stats/dashboard") {
    let all = _dRecs();
    const branch = qs.get("branch");
    if (branch) all = all.filter(r => r.branch === branch);
    return {
      total: all.length,
      opened: all.filter(r=>r.status==="Opened").length,
      pending: all.filter(r=>r.status==="Pending").length,
      closed: all.filter(r=>r.status==="Closed").length,
      monthlyTrend:[{_id:{year:2025,month:11},count:18},{_id:{year:2025,month:12},count:22},{_id:{year:2026,month:1},count:27},{_id:{year:2026,month:2},count:19},{_id:{year:2026,month:3},count:31},{_id:{year:2026,month:4},count:25}]
    };
  }
  if (base === "/services" && method === "GET") {
    let all = _dRecs();
    if (qs.get("search")) { const q = qs.get("search").toLowerCase(); all = all.filter(r => JSON.stringify(r).toLowerCase().includes(q)); }
    if (qs.get("status")) all = all.filter(r => r.status === qs.get("status"));
    if (qs.get("brand"))  all = all.filter(r => r.brand === qs.get("brand"));
    if (qs.get("category")) all = all.filter(r => r.category === qs.get("category"));
    if (qs.get("branch")) all = all.filter(r => r.branch === qs.get("branch"));
    const pg = parseInt(qs.get("page") || "1"), lim = 20;
    return { records: all.slice((pg-1)*lim, pg*lim), total: all.length, page: pg, pages: Math.ceil(all.length/lim) };
  }
  if (base === "/services" && method === "POST") {
    const rec = { _id:"r"+Date.now(), serviceNumber:"OSM-2026-"+Math.floor(Math.random()*99999), ...body, branch: S.user.branch, status:"Opened", openedAt: new Date().toISOString(), createdAt: new Date().toISOString(), statusHistory:[] };
    _dRecs().unshift(rec);
    return rec;
  }
  if (method === "PATCH" && base.startsWith("/services/")) {
    const r = _dRecs().find(x => base.endsWith(x._id));
    if (r) { if (body.status) r.status = body.status; if (body.remarks !== undefined) r.remarks = body.remarks; }
    return r || {};
  }
  if (base === "/users/technicians") return [{ _id:"t1", fullName:"Ahmed Musa" }, { _id:"t2", fullName:"Chidi Obi" }, { _id:"t3", fullName:"Emeka Nwosu" }];
  if (base === "/users/coordinators") return _dUsrs().filter(u => u.userType === "Service Coordinator" && u.status === "Approved");
  if (base === "/users/pending") return _dUsrs().filter(u => u.status === "Pending");
  if (base === "/users" && method === "GET") {
    let u = _dUsrs();
    if (qs.get("status")) u = u.filter(x => x.status === qs.get("status"));
    if (qs.get("userType")) u = u.filter(x => x.userType === qs.get("userType"));
    if (qs.get("search")) { const q = qs.get("search").toLowerCase(); u = u.filter(x => x.fullName.toLowerCase().includes(q) || (x.email||"").toLowerCase().includes(q)); }
    return u;
  }
  if (method === "PATCH" && base.includes("/approve")) {
    const u = _dUsrs().find(x => base.includes(x._id));
    if (u) { u.status = "Approved"; if (body.password) u.password = body.password; }
    return { message: "Approved" };
  }
  if (method === "PATCH" && base.includes("/reject")) {
    const u = _dUsrs().find(x => base.includes(x._id));
    if (u) u.status = "Rejected";
    return { message: "Rejected" };
  }
  return {};
}

async function exportExcel() {
  try {
    let records = [];
    if (S.api === "DEMO") {
      records = _dRecs();
    } else {
      const p = new URLSearchParams({ page:1, limit:9999 });
      if (SF.search)   p.set("search",   SF.search);
      if (SF.status)   p.set("status",   SF.status);
      if (SF.brand)    p.set("brand",    SF.brand);
      if (SF.category) p.set("category", SF.category);
      const isCoord = ["Service Coordinator","Service Technician","Branch User"].includes(S.user.userType);
      if (isCoord && S.user.branch) p.set("branch", S.user.branch);
      else if (SF.branch) p.set("branch", SF.branch);
      const d = await call("GET", "/services?" + p);
      records = d.records || [];
    }
    if (!records.length) { alert("No records to export."); return; }
    const rows = records.map(r => ({
      "Service No":        r.serviceNumber || "",
      "Date":              r.serviceDate ? new Date(r.serviceDate).toLocaleDateString("en-GB") : "",
      "Branch":            r.branch || "",
      "Brand":             r.brand || "",
      "Category":          CAT_NAMES[r.category] || r.category || "",
      "Orion Code":        r.orionCode || "",
      "Orion Description": r.orionDescription || "",
      "Sub-Category":      r.subCategory || "",
      "Technician":        r.technician?.name || "",
      "Status":            r.status || "",
      "Opened At":         r.openedAt  ? new Date(r.openedAt).toLocaleString()  : "",
      "Closed At":         r.closedAt  ? new Date(r.closedAt).toLocaleString()  : "",
      "Remarks":           r.remarks || "",
      "Created By":        r.createdByName || "",
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = Object.keys(rows[0]).map(k => ({ wch: Math.max(k.length + 2, 16) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Service Records");
    XLSX.writeFile(wb, `OSM_Records_${new Date().toISOString().split("T")[0]}.xlsx`);
  } catch(e) { alert("Export failed: " + e.message); }
}

async function loadSvc() {
  const el = qs("#svc-tbl"); if (!el) return;
  el.innerHTML = `<div class="ld"><span class="spin"></span> Loading...</div>`;
  try {
    const p = new URLSearchParams({ page: SF.page, limit: 20 });
    if (SF.search)   p.set("search",   SF.search);
    if (SF.status)   p.set("status",   SF.status);
    if (SF.brand)    p.set("brand",    SF.brand);
    if (SF.category) p.set("category", SF.category);
    if (SF.sortBy)   p.set("sortBy",   SF.sortBy);
    if (SF.sortDir)  p.set("sortDir",  SF.sortDir);
    // Coordinators/technicians/branch users only see their own branch.
    // HO/Admin can additionally narrow to one branch via the dropdown —
    // combines with every other filter above.
    const isCoord = ["Service Coordinator","Service Technician","Branch User"].includes(S.user.userType);
    if (isCoord && S.user.branch) p.set("branch", S.user.branch);
    else if (SF.branch) p.set("branch", SF.branch);
    const d = await call("GET", "/services?" + p);
    SVC = d;
    if (!d.records.length) { el.innerHTML = `<div class="empty">No service records found.</div>`; qs("#svc-pager").innerHTML=""; return; }
    const canEdit = ["Service Coordinator","Head Office Team","System Administrator"].includes(S.user.userType);
    const arr = (col) => SF.sortBy===col ? (SF.sortDir==="asc"?" ▲":" ▼") : " ⇅";
    const th = (col,lbl) => `<th style="cursor:pointer;user-select:none;white-space:nowrap" data-sort="${col}">${lbl}<span style="opacity:0.45;font-size:10px">${arr(col)}</span></th>`;
    el.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr>${th("serviceNumber","Service No")}${th("serviceDate","Date")}${th("branch","Branch")}${th("brand","Brand")}${th("category","Category")}<th>Description</th>${th("technician.name","Technician")}${th("status","Status")}<th>Actions</th></tr></thead>
      <tbody>${d.records.map(r=>`<tr>
        <td class="bold" style="color:var(--blue)">${r.serviceNumber||"—"}</td>
        <td>${fmtDate(r.serviceDate)}</td><td>${r.branch||"—"}</td><td>${r.brand}</td>
        <td>${CAT_NAMES[r.category]||r.category}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.orionDescription}">${r.orionDescription}</td>
        <td>${r.technician?.name||"—"}</td><td>${statusBadge(r.status)}</td>
        <td><div class="tbl-actions">
          <button class="btn btn-secondary btn-sm" data-view="${r._id}">View</button>
          ${canEdit?`<button class="btn btn-primary btn-sm" data-edit="${r._id}">Edit</button>`:""}
        </div></td>
      </tr>`).join("")}</tbody>
    </table></div>`;
    // Bind sort headers
    qsa("th[data-sort]", el).forEach(th => on(th, "click", () => {
      if (SF.sortBy === th.dataset.sort) {
        SF.sortDir = SF.sortDir === "asc" ? "desc" : "asc";
      } else {
        SF.sortBy = th.dataset.sort;
        SF.sortDir = "asc";
      }
      SF.page = 1; loadSvc();
    }));
    // Bind view/edit buttons
    qsa("[data-view]", el).forEach(b => on(b, "click", () => openView(b.dataset.view)));
    qsa("[data-edit]", el).forEach(b => on(b, "click", () => openEdit(b.dataset.edit)));
    // Pager
    const pg = qs("#svc-pager");
    if (d.pages <= 1) { pg.innerHTML = ""; return; }
    const btns = [];
    for (let i=1; i<=d.pages; i++) {
      if (i===1||i===d.pages||Math.abs(i-d.page)<=2) btns.push(`<button class="pg-btn${i===d.page?" active":""}" data-p="${i}">${i}</button>`);
      else if (btns[btns.length-1]!=="…") btns.push("…");
    }
    pg.innerHTML = `<div class="pager"><div class="pager-info">Showing ${Math.min((d.page-1)*20+1,d.total)}–${Math.min(d.page*20,d.total)} of ${d.total}</div><div class="pager-btns">${btns.join("")}</div></div>`;
    qsa(".pg-btn", pg).forEach(b => on(b, "click", () => { SF.page=parseInt(b.dataset.p); loadSvc(); }));
  } catch(e) { el.innerHTML = alert_html(e.message,"error"); }
}

async function bindCreate() {
  CF2 = { brand:"", category:"", orionDescription:"", orionCode:"", subCategory:"", techId:"", techName:"" };
  // Set today's date
  const di = qs("#c-date");
  if (di) di.value = new Date().toISOString().split("T")[0];
  // Load techs
  try { techs = await call("GET", "/users/technicians" + (S.user.branch ? "?branch=" + encodeURIComponent(S.user.branch) : "")); } catch { techs = []; }
  // Close dropdowns on outside click
  document.addEventListener("click", function closeDD(e) {
    if (!e.target.closest(".ac-wrap")) qsa(".ac-dd").forEach(d=>d.classList.remove("open"));
  });
  // Brand autocomplete
  setupAC("c-brand", "c-brand-dd",
    val => (PM_CACHE.brands.length ? PM_CACHE.brands : [...new Set(PM_CACHE.products.map(p=>p.brand||""))].filter(Boolean).sort())
        .filter(b=>b.toLowerCase().includes(val.toLowerCase())).slice(0,8)
        .map(b=>`<div class="ac-item" data-val="${b}">${b}</div>`).join(""),
    (el) => { CF2.brand = el.dataset.val; qs("#c-brand").value = el.dataset.val; }
  );
  // Category autocomplete
  setupAC("c-cat", "c-cat-dd",
    val => (PM_CACHE.categories.length ? PM_CACHE.categories : [...new Set(PM_CACHE.products.map(p=>p.category||""))].filter(Boolean).sort())
        .filter(c=>(CAT_NAMES[c]||c).toLowerCase().includes(val.toLowerCase())).slice(0,8)
        .map(c=>`<div class="ac-item" data-val="${c}">${CAT_NAMES[c]||c}<small>${c}</small></div>`).join(""),
    (el) => { CF2.category = el.dataset.val; qs("#c-cat").value = CAT_NAMES[el.dataset.val]||el.dataset.val; }
  );
  // Orion autocomplete — all from PM_CACHE (loaded from backend)
  setupAC("c-orion", "c-orion-dd",
    val => {
      let prods = PM_CACHE.products;
      if (CF2.brand)    prods = prods.filter(p=>(p.brand||"").toUpperCase()===(CF2.brand||"").toUpperCase());
      if (CF2.category) prods = prods.filter(p=>(p.category||"").toUpperCase()===(CF2.category||"").toUpperCase());
      const matches = prods.filter(p=>(p.orionDescription||"").toLowerCase().includes(val.toLowerCase())).slice(0,12)
        .map(p=>`<div class="ac-item" data-desc="${p.orionDescription}" data-code="${p.orionCode||""}" data-sub="${p.subCategory||""}" data-cat="${p.category}" data-brand="${p.brand}">${p.orionDescription}<small>${p.brand} · ${CAT_NAMES[p.category]||p.category} · ${p.subCategory||""} · ${p.orionCode||""}</small></div>`);
      const addManually = `<div class="ac-item" data-manual="1" style="color:var(--blue);font-weight:600;border-top:1px solid var(--gray-200)">+ Add Manually — enter product details</div>`;
      return [...matches, addManually].join("");
    },
    (el) => {
      if (el.dataset.manual) {
        // Show manual entry fields
        showManualEntry();
        return;
      }
      CF2.orionDescription = el.dataset.desc;
      CF2.orionCode = el.dataset.code;
      CF2.subCategory = el.dataset.sub;
      CF2.category = el.dataset.cat;
      CF2.brand = el.dataset.brand;
      qs("#c-orion").value = el.dataset.desc;
      qs("#c-code").value = el.dataset.code;
      qs("#c-sub").value = el.dataset.sub;
      qs("#c-cat").value = CAT_NAMES[el.dataset.cat]||el.dataset.cat;
      qs("#c-brand").value = el.dataset.brand;
      // Hide manual entry if visible
      const me = qs("#manual-entry");
      if (me) me.style.display = "none";
    }
  );
  // Tech autocomplete
  setupAC("c-tech", "c-tech-dd",
    val => {
      const filtered = techs.filter(t=>t.fullName.toLowerCase().includes(val.toLowerCase()));
      let html = filtered.slice(0,6).map(t=>`<div class="ac-item" data-id="${t._id}" data-name="${t.fullName}">${t.fullName}<small>Registered Technician</small></div>`).join("");
      html += `<div class="ac-item" data-id="" data-name="${val}"><em>Use "${val}" manually</em></div>`;
      return html;
    },
    (el) => { CF2.techId = el.dataset.id; CF2.techName = el.dataset.name; qs("#c-tech").value = el.dataset.name; qs("#c-tech-id").value = el.dataset.id; }
  );
  on(qs("#cr-btn"), "click", submitCreate);
}

function showManualEntry() {
  const me = qs("#manual-entry");
  if (me) {
    me.style.display = "block";
    // Clear orion search field
    const co = qs("#c-orion");
    if (co) co.value = "";
    // Clear previously selected orion data
    CF2.orionDescription = ""; CF2.orionCode = ""; CF2.subCategory = ""; CF2.category = ""; CF2.brand = "";
    if (qs("#c-brand")) qs("#c-brand").value = "";
    if (qs("#c-cat"))   qs("#c-cat").value = "";
    if (qs("#c-code"))  qs("#c-code").value = "";
    if (qs("#c-sub"))   qs("#c-sub").value = "";
    // Bind confirm + cancel
    on(qs("#m-confirm-btn"), "click", () => {
      const brand = (qs("#m-brand")||{}).value?.trim();
      const cat   = (qs("#m-cat")||{}).value;
      const code  = (qs("#m-code")||{}).value?.trim();
      const sub   = (qs("#m-sub")||{}).value?.trim();
      const desc  = (qs("#m-desc")||{}).value?.trim();
      if (!brand || !cat || !desc) {
        alert("Brand, Category and Orion Description are required for manual entry.");
        return;
      }
      // Store in CF2 for complaint submission
      CF2.brand = brand; CF2.category = cat; CF2.orionCode = code;
      CF2.orionDescription = desc; CF2.subCategory = sub;
      // Reflect in visible fields
      if (qs("#c-brand")) qs("#c-brand").value = brand;
      if (qs("#c-cat"))   qs("#c-cat").value = CAT_NAMES[cat] || cat;
      if (qs("#c-orion")) qs("#c-orion").value = desc;
      if (qs("#c-code"))  qs("#c-code").value = code;
      if (qs("#c-sub"))   qs("#c-sub").value = sub;
      me.style.display = "none";
    });
    on(qs("#m-cancel-btn"), "click", () => { me.style.display = "none"; });
  }
}
function setupAC(inputId, ddId, getItems, onSelect) {
  const inp = qs("#" + inputId);
  const dd  = qs("#" + ddId);
  if (!inp || !dd) return;
  on(inp, "input", () => {
    const val = inp.value.trim();
    if (!val) { dd.classList.remove("open"); return; }
    dd.innerHTML = getItems(val);
    dd.classList.toggle("open", !!dd.innerHTML);
  });
  on(dd, "click", e => {
    const item = e.target.closest(".ac-item");
    if (item) { onSelect(item); dd.classList.remove("open"); }
  });
}
async function submitCreate() {
  const date = (qs("#c-date")||{}).value;
  const brand = (qs("#c-brand")||{}).value || CF2.brand;
  const orion = (qs("#c-orion")||{}).value || CF2.orionDescription;
  const tech  = (qs("#c-tech")||{}).value  || CF2.techName;
  const techId = (qs("#c-tech-id")||{}).value || CF2.techId;
  const rem = (qs("#c-rem")||{}).value;
  if (!date||!brand||!orion||!tech) {
    qs("#cr-alert").innerHTML = alert_html("Please fill: Date, Brand, Orion Description, and Technician.","error");
    return;
  }
  // Collect optional additional information
  const custDop   = (qs("#c-cust-dop")  ||{}).value;
  const custName  = (qs("#c-cust-name") ||{}).value?.trim();
  const custAddr  = (qs("#c-cust-addr") ||{}).value?.trim();
  const custPhone = (qs("#c-cust-phone")||{}).value?.trim();
  const dlrDop    = (qs("#c-dlr-dop")   ||{}).value;
  const dlrName   = (qs("#c-dlr-name")  ||{}).value?.trim();
  const dlrAddr   = (qs("#c-dlr-addr")  ||{}).value?.trim();
  const dlrPhone  = (qs("#c-dlr-phone") ||{}).value?.trim();
  const prodLoc   = (qs("#c-prod-loc")  ||{}).value?.trim();
  const prodSerial= (qs("#c-prod-serial")||{}).value?.trim();

  const payload = {
    serviceDate: date, brand, category: CF2.category, orionDescription: orion,
    orionCode: CF2.orionCode, subCategory: CF2.subCategory, remarks: rem,
    technician: { id: techId||undefined, name: tech }
  };
  if (custDop||custName||custAddr||custPhone)
    payload.customer = { dateOfPurchase: custDop||undefined, name: custName||undefined, address: custAddr||undefined, phone: custPhone||undefined };
  if (dlrDop||dlrName||dlrAddr||dlrPhone)
    payload.dealer = { dateOfPurchase: dlrDop||undefined, name: dlrName||undefined, address: dlrAddr||undefined, phone: dlrPhone||undefined };
  if (prodLoc||prodSerial)
    payload.productInfo = { location: prodLoc||undefined, serialNo: prodSerial||undefined };

  const btn = qs("#cr-btn"); btn.disabled=true; btn.innerHTML=`<span class="spin"></span> Creating...`;
  try {
    await call("POST", "/services", payload);
    qs("#cr-alert").innerHTML = alert_html("✅ Service record created successfully!","success");
    CF2 = { brand:"",category:"",orionDescription:"",orionCode:"",subCategory:"",techId:"",techName:"" };
    setTimeout(() => go("services"), 1200);
  } catch(e) { qs("#cr-alert").innerHTML = alert_html(e.message,"error"); btn.disabled=false; btn.innerHTML="Create Service Record"; }
}

async function loadUsers(extra) {
  const el = qs("#usr-tbl"); if (!el) return;
  el.innerHTML = `<div class="ld"><span class="spin"></span> Loading...</div>`;
  try {
    const current = {
      search:   (qs("#uf-search")||{}).value  || "",
      userType: (qs("#uf-type")||{}).value    || "",
      status:   (qs("#uf-status")||{}).value  || "",
      branch:   (qs("#uf-branch")||{}).value  || "",
    };
    const merged = { ...current, ...extra };
    const p = new URLSearchParams();
    Object.entries(merged).forEach(([k,v]) => { if (v) p.set(k, v); });
    usersData = await call("GET", "/users?" + p);
    if (!usersData.length) { el.innerHTML=`<div class="empty">No users found.</div>`; return; }
    el.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Mobile</th><th>Job Role</th><th>User Type</th><th>Branch</th><th>Status</th><th>Registered</th><th>Actions</th></tr></thead>

    qsa("[data-approve]", el).forEach(b => on(b,"click",()=>openApprove(b.dataset.approve, b.dataset.name, b.dataset.type, "usr-modal")));
    qsa("[data-reject]",  el).forEach(b => on(b,"click",()=>rejectUser(b.dataset.reject, loadUsers)));

function fmtDT(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) + " " +
         d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}

async function bindProducts() {
  await refreshProductMeta();

  on(qs("#pm-search"),  "input",  debounce(e => { productFilters.search = e.target.value; productPage = 1; loadProductsPage(); }, 300));
  on(qs("#pm-brand-f"), "change", e => { productFilters.brand = e.target.value; productPage = 1; loadProductsPage(); });
  on(qs("#pm-cat-f"),   "change", e => { productFilters.category = e.target.value; productPage = 1; loadProductsPage(); });

  const isHO = ["Head Office Team","System Administrator"].includes(S.user.userType);
  if (isHO) {
    on(qs("#pm-import-btn"), "click", openImportModal);

async function refreshProductMeta() {
  if (S.api === "DEMO") {
    const total = PM_CACHE.products.length || 237;
    const brands = PM_CACHE.brands.length ? PM_CACHE.brands.length : 6;
    const cats   = PM_CACHE.categories.length ? PM_CACHE.categories.length : 14;
    if (qs("#pm-total"))    qs("#pm-total").textContent    = total;
    if (qs("#pm-brands"))   qs("#pm-brands").textContent   = brands;
    if (qs("#pm-cats"))     qs("#pm-cats").textContent     = cats;
    if (qs("#pm-imported")) qs("#pm-imported").textContent = "Demo Mode";
    if (qs("#pm-sub"))      qs("#pm-sub").textContent      = `${total} products in catalogue`;
    // Populate filter selects from cache
    const brandSel = qs("#pm-brand-f");
    const catSel   = qs("#pm-cat-f");
    if (brandSel) PM_CACHE.brands.forEach(b => { const o = document.createElement("option"); o.value = b; o.textContent = b; brandSel.appendChild(o); });
    if (catSel)   PM_CACHE.categories.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = `${CAT_NAMES[c]||c} (${c})`; catSel.appendChild(o); });
    return;
  }
  try {
    const m = await call("GET", "/products/meta");
    productsMeta = m;
    PM_CACHE.brands = m.brands || [];
    PM_CACHE.categories = m.categories || [];
    if (qs("#pm-total"))    qs("#pm-total").textContent    = m.total;
    if (qs("#pm-brands"))   qs("#pm-brands").textContent   = (m.brands||[]).length;
    if (qs("#pm-cats"))     qs("#pm-cats").textContent     = (m.categories||[]).length;
    if (qs("#pm-imported")) qs("#pm-imported").textContent = m.lastImport ? fmtDT(m.lastImport.createdAt).split(" ").slice(0,3).join(" ") : "Never";
    if (qs("#pm-sub"))      qs("#pm-sub").textContent      = `${m.total} products in catalogue`;
    // Populate filter selects
    const brandSel = qs("#pm-brand-f");
    const catSel   = qs("#pm-cat-f");
    if (brandSel) (m.brands||[]).forEach(b => { const o = document.createElement("option"); o.value = b; o.textContent = b; brandSel.appendChild(o); });
    if (catSel)   (m.categories||[]).forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = `${CAT_NAMES[c]||c} (${c})`; catSel.appendChild(o); });
  } catch(e) { console.error("Meta load failed:", e); }
}

async function loadProductsPage() {
  const el = qs("#products-tbl");
  if (!el) return;
  el.innerHTML = `<div class="ld"><span class="spin"></span> Loading...</div>`;
  const isAdmin = S.user.userType === "System Administrator";

  if (S.api === "DEMO") {
    let prods = PM_CACHE.products;
    if (productFilters.search)   prods = prods.filter(p => JSON.stringify(p).toLowerCase().includes(productFilters.search.toLowerCase()));
    if (productFilters.brand)    prods = prods.filter(p => p.brand === productFilters.brand);
    if (productFilters.category) prods = prods.filter(p => p.category === productFilters.category);
    productsData = prods;
    renderProductsTable(prods.slice((productPage-1)*PRODUCT_LIMIT, productPage*PRODUCT_LIMIT), prods.length, isAdmin);
    return;
  }
  try {
    const p = new URLSearchParams({ page: productPage, limit: PRODUCT_LIMIT });
    Object.entries(productFilters).forEach(([k,v]) => { if (v) p.set(k, v); });
    const r = await call("GET", "/products?" + p);
    productsData = r.products || [];
    const total  = r.total || 0;
    renderProductsTable(productsData, total, isAdmin);
    // Pagination
    const pager = qs("#pm-pager");
    if (pager && r.pages > 1) {
      pager.innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:8px 0">
        <button class="btn btn-secondary btn-sm" ${productPage<=1?"disabled":""} onclick="productPage--;loadProductsPage()">‹ Prev</button>
        <span class="sm muted">Page ${r.page} of ${r.pages} (${total} products)</span>
        <button class="btn btn-secondary btn-sm" ${productPage>=r.pages?"disabled":""} onclick="productPage++;loadProductsPage()">Next ›</button>
      </div>`;
    }
  } catch(e) { el.innerHTML = alert_html(e.message, "error"); }
}

function renderProductsTable(prods, total, isAdmin) {
  const el = qs("#products-tbl");
  if (!el) return;
  if (!prods.length) {
    el.innerHTML = `<div class="empty"><p>No products found.</p><p class="sm muted mt1">Upload a Product Master Excel file to populate the catalogue.</p></div>`;
    return;
  }
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr>
      <th>Brand</th><th>Category</th><th>Orion Code</th><th>Orion Description</th><th>Sub-Category</th>
      ${isAdmin ? "<th>Actions</th>" : ""}
    </tr></thead>
    <tbody>${prods.map(p => `<tr>
      <td class="bold">${p.brand||"—"}</td>
      <td>${CAT_NAMES[p.category]||p.category||"—"}</td>
      <td style="font-size:12px;color:var(--gray-500)">${p.orionCode||"—"}</td>
      <td>${p.orionDescription||"—"}</td>
      <td>${p.subCategory||"—"}</td>
      ${isAdmin ? `<td><button class="btn btn-danger btn-sm" data-del="${p._id}">Delete</button></td>` : ""}
    </tr>`).join("")}
    </tbody>
  </table></div>
  <div class="sm muted" style="padding:8px 0">Showing ${prods.length} of ${total} products</div>`;

  if (isAdmin) {
    qsa("[data-del]", el).forEach(b => on(b, "click", () => deleteProduct(b.dataset.del)));
  }
}

function downloadTemplate() {
  if (S.api === "DEMO") { alert("Template download is not available in Demo Mode."); return; }
  window.open(S.api + "/api/products/template?token=" + S.token, "_blank");
  // Fallback: use fetch for Bearer auth
  fetch(S.api + "/api/products/template", { headers: { Authorization: "Bearer " + S.token } })
    .then(r => r.blob()).then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "ProductMaster_Template.xlsx"; a.click();
      URL.revokeObjectURL(url);
    }).catch(() => {});

function openImportModal() {
  _importPreview = null;
  showModal(`<div class="modal-hdr"><div class="modal-title">Upload Product Master</div><button class="modal-close" id="mc">${ICONS.x}</button></div>

  dropZone.addEventListener("click", () => fileInput.click());

  dropZone.addEventListener("drop", e => {
    e.preventDefault(); dropZone.style.borderColor = "var(--gray-200)";
    if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; handleFileSelect(e.dataTransfer.files[0]); }
  });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) handleFileSelect(fileInput.files[0]); });

  function handleFileSelect(file) {
    selectedFile = file;

        headers: { Authorization: "Bearer " + S.token },

            <div class="sm muted">Duplicates</div>
          </div>
          <div style="background:#fff;padding:10px;border-radius:6px;border:1px solid var(--gray-200);text-align:center">
            <div style="font-size:20px;font-weight:700;color:var(--gray-700)">${d.totalRows}</div>
            <div class="sm muted">Total Rows</div>
          </div>
        </div>
      </div>
      ${d.invalidDetails && d.invalidDetails.length ? `
        <div style="background:var(--red-bg);border-radius:6px;padding:10px 14px;margin-bottom:12px">
          <strong style="color:var(--red)">⚠ ${d.invalidRows} invalid rows</strong>
          <ul style="margin:6px 0 0 16px;font-size:12px;color:var(--red)">${d.invalidDetails.map(e=>`<li>Row ${e.row}: ${e.errors.join("; ")}</li>`).join("")}</ul>
        </div>` : ""}
      ${d.duplicateDetails && d.duplicateDetails.length ? `
        <div style="background:var(--amber-bg);border-radius:6px;padding:10px 14px;margin-bottom:12px">
          <strong style="color:var(--amber)">ℹ ${d.duplicateRows} duplicate rows skipped</strong>
          <ul style="margin:6px 0 0 16px;font-size:12px;color:var(--amber)">${d.duplicateDetails.map(e=>`<li>Row ${e.row}: "${e.orionDescription}" (first at row ${e.firstRow})</li>`).join("")}</ul>
        </div>` : ""}
      ${d.preview && d.preview.length ? `
        <div style="margin-bottom:8px"><strong>Preview (first ${d.preview.length} products)</strong></div>
        <div class="tbl-wrap" style="max-height:200px;overflow-y:auto"><table>
          <thead><tr><th>Brand</th><th>Category</th><th>Orion Code</th><th>Orion Description</th><th>Sub-Category</th></tr></thead>
          <tbody>${d.preview.map(p=>`<tr><td>${p.brand}</td><td>${p.category}</td><td style="font-size:11px">${p.orionCode}</td><td>${p.orionDescription}</td><td>${p.subCategory}</td></tr>`).join("")}
          </tbody>
        </table></div>` : ""}
      <div style="background:var(--amber-bg);border-radius:6px;padding:10px 14px;margin-top:12px;font-size:13px;color:var(--amber)">
        ℹ <strong>Note:</strong> ${d.newProducts} new product${d.newProducts!==1?'s':''} will be added, ${d.updatedProducts} existing product${d.updatedProducts!==1?'s':''} will be updated. Products <strong>not in this file are kept unchanged</strong>.
      </div>
    `;
    // Swap footer buttons
    const foot = el.closest(".modal")?.querySelector(".modal-foot");
    if (foot && d.validProducts > 0) {
      foot.innerHTML = `
        <button class="btn btn-secondary" id="mc2">Cancel</button>
        <button class="btn btn-primary" id="imp-confirm-btn">Upload New Product Master</button>`;
      on(qs("#imp-confirm-btn"), "click", confirmImport);
    }
  }

  async function confirmImport() {
    if (!_importPreview) return;
    const btn = qs("#imp-confirm-btn");
    btn.disabled = true;
    btn.innerHTML = `<span class="spin"></span> Importing...`;
    try {
      const payload = {
        parsedRows:      _importPreview._parsedRows,
        fileName:        _importPreview.fileName,
        totalRows:       _importPreview.totalRows,
        newProducts:     _importPreview.newProducts,
        updatedProducts: _importPreview.updatedProducts,
        failedRecords:   _importPreview.invalidRows,
      };
      const result = await call("POST", "/products/import/confirm", payload);
      closeModal();
      // Reset cache and reload page
      PM_CACHE.loaded = false;
      await loadProductMaster();
      // Reload products page
      productPage = 1;
      Object.keys(productFilters).forEach(k => productFilters[k] = "");
      await refreshProductMeta();
      await loadProductsPage();
      await loadImportHistory();
      // Show success toast
      const alert = qs("#app-alert");
      if (alert) { alert.innerHTML = alert_html(`✓ ${result.message}`, "success"); setTimeout(() => { if(alert) alert.innerHTML = ""; }, 6000); }
    } catch(e) {
      btn.disabled = false;
      btn.innerHTML = "Replace Product Master";
      qs("#imp-alert").innerHTML = alert_html(e.message, "error");
    }
  }
}

async function loadProducts(extra = {}) {
  // Compatibility shim — delegates to new function
  if (extra.search !== undefined) productFilters.search = extra.search;
  if (extra.brand   !== undefined) productFilters.brand   = extra.brand;
  if (extra.category !== undefined) productFilters.category = extra.category;
  productPage = 1;
  await loadProductsPage();
}

async function deleteProduct(id) {
  if (!confirm("Delete this product? This cannot be undone.")) return;
  try {
    if (S.api === "DEMO") { PM_CACHE.products = PM_CACHE.products.filter(p => p._id !== id); }
    else { await call("DELETE", "/products/" + id); }
    PM_CACHE.loaded = false;
    loadProductMaster();
    loadProductsPage();
    refreshProductMeta();
  } catch(e) { alert(e.message); }
}


// ── Modal helper ─────────────────────────────────────────
function showModal(html, containerId) {
  const wrap = document.createElement("div");
  wrap.className = "overlay";
  wrap.innerHTML = `<div class="modal">${html}</div>`;
  wrap.addEventListener("click", e => { if(e.target===wrap) closeModal(); });
  document.body.appendChild(wrap);
  S.modal = wrap;
  on(qs("#mc", wrap),  "click", closeModal);
  on(qs("#mc2", wrap), "click", closeModal);
}
function closeModal() { if (S.modal) { S.modal.remove(); S.modal=null; } }

// ── Alert helper ─────────────────────────────────────────
function alert_html(msg, type) { return `<div class="alert alert-${type}">${msg}</div>`; }

// ── Boot ─────────────────────────────────────────────────
render();
</script>
</body>
</html>
